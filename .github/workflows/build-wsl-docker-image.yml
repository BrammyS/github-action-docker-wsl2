name: build-wsl-docker-image

on:
  workflow_dispatch:
    inputs:
      alpine_version:
        description: 'Alpine Linux version (e.g. 3.24.1)'
        required: true
        type: string

jobs:
  build:
    runs-on: windows-2025
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Enable WSL
        shell: pwsh
        run: |
          wsl --install --no-distribution
          wsl --set-default-version 2

      - name: Download Alpine minirootfs
        shell: pwsh
        run: |
          $version = "${{ inputs.alpine_version }}"
          $major = $version.Substring(0, $version.LastIndexOf('.'))
          $url = "https://dl-cdn.alpinelinux.org/alpine/v${major}/releases/x86_64/alpine-minirootfs-${version}-x86_64.tar.gz"
          Write-Output "Downloading from: $url"
          $retries = 3
          for ($i = 1; $i -le $retries; $i++) {
            try {
              Invoke-WebRequest -Uri $url -OutFile "$PWD\alpine-minirootfs.tar.gz" -MaximumRetryCount 3 -RetryIntervalSec 5
              break
            } catch {
              if ($i -eq $retries) { throw }
              Write-Output "Download attempt $i failed, retrying..."
              Start-Sleep -Seconds 10
            }
          }

      - name: Import Alpine into WSL
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$PWD\AlpineRoot" | Out-Null
          wsl --import Alpine "$PWD\AlpineRoot" "$PWD\alpine-minirootfs.tar.gz"
          wsl -d Alpine -- cat /etc/os-release

      - name: Install Docker in Alpine
        shell: pwsh
        run: |
          wsl -d Alpine -- apk update
          wsl -d Alpine -- apk add docker docker-cli-compose openrc

      - name: Configure Docker for TCP access
        shell: pwsh
        run: |
          wsl -d Alpine -- sh -c 'mkdir -p /etc/docker && echo "{\"hosts\": [\"tcp://127.0.0.1:2375\", \"unix:///var/run/docker.sock\"]}" > /etc/docker/daemon.json'

      - name: Verify Docker installed
        shell: pwsh
        run: |
          wsl -d Alpine -- docker --version
          wsl -d Alpine -- dockerd --version

      - name: Export WSL distro
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$PWD\wsl" | Out-Null
          wsl --export Alpine "$PWD\wsl\alpine-docker-wsl.tar"

      - name: Commit to repository
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wsl/alpine-docker-wsl.tar
          git commit -m "Update Alpine Docker WSL export (Alpine ${{ inputs.alpine_version }})"
          git push
