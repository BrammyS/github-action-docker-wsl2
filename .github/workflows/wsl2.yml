name: validate-wsl-2

on:
  schedule:
    - cron: '0 12 * * 0' # Every Sunday at noon UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2025
    timeout-minutes: 30
    env:
      DOCKER_HOST: tcp://127.0.0.1:2375
      WSL_DISTRO: Alpine

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: false

      - name: Create LFS file list
        shell: pwsh
        run: git lfs ls-files -l | ForEach-Object { $_.Split(' ')[0] } | Sort-Object | Set-Content .lfs-assets-id

      - name: Restore LFS cache
        uses: actions/cache@v4
        id: lfs-cache
        with:
          path: .git/lfs
          key: ${{ runner.os }}-lfs-${{ hashFiles('.lfs-assets-id') }}
          restore-keys: |
            ${{ runner.os }}-lfs-

      - name: Pull LFS files
        shell: pwsh
        run: git lfs pull

      - name: Enable WSL
        shell: pwsh
        run: |
          wsl --install --no-distribution
          wsl --set-default-version 2

      - name: Import Alpine into WSL
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$PWD\AlpineRoot" | Out-Null
          wsl --import $env:WSL_DISTRO "$PWD\AlpineRoot" "${{ github.workspace }}\wsl\alpine-docker-wsl.tar"
          wsl -d $env:WSL_DISTRO -- cat /etc/os-release

      - name: Start Docker daemon and keep WSL alive
        shell: pwsh
        run: |
          # Start a keep-alive process so the WSL VM doesn't shut down between steps
          wsl -d $env:WSL_DISTRO -- sh -c 'nohup sleep infinity > /dev/null 2>&1 &'
          # Start Docker daemon
          wsl -d $env:WSL_DISTRO -- sh -c 'nohup dockerd > /var/log/dockerd.log 2>&1 & sleep 15 && docker info'

      - name: Install Docker CLI on Windows
        shell: pwsh
        run: |
          choco install docker-cli -y

      - name: Verify Docker from Windows
        shell: pwsh
        run: |
          docker info

      - name: Run hello-world container
        shell: pwsh
        run: |
          docker run hello-world:linux

      - name: Wait 2 minutes and verify WSL + Docker still alive
        shell: pwsh
        run: |
          Write-Output "Sleeping 2 minutes to test WSL persistence..."
          Start-Sleep -Seconds 120
          Write-Output "Verifying Docker is still responsive..."
          docker run hello-world:linux
