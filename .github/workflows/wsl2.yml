name: wsl-2-action

on:
  schedule:
    - cron: '0 12 * * 0' # Every Sunday at noon UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2025
    timeout-minutes: 30
    env:
      DOCKER_HOST: tcp://127.0.0.1:2375
      WSL_DISTRO: Alpine

    steps:
      - uses: actions/checkout@v4

      - name: Enable WSL
        shell: pwsh
        run: |
          wsl --install --no-distribution
          wsl --set-default-version 2

      - name: Get latest build run ID
        id: get-run-id
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $runId = gh run list `
            --workflow build-wsl-docker-image.yml `
            --status success `
            --limit 1 `
            --json databaseId `
            --jq '.[0].databaseId'
          if (-not $runId) {
            Write-Error "No successful build-wsl-docker-image workflow run found. Run the build workflow first."
            exit 1
          }
          Write-Output "run-id=$runId" >> $env:GITHUB_OUTPUT

      - name: Download Alpine Docker WSL artifact
        uses: actions/download-artifact@v4
        with:
          name: alpine-docker-wsl
          path: ${{ github.workspace }}\wsl-artifact
          run-id: ${{ steps.get-run-id.outputs.run-id }}
          github-token: ${{ github.token }}

      - name: Import Alpine into WSL
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path "$PWD\AlpineRoot" | Out-Null
          wsl --import $env:WSL_DISTRO "$PWD\AlpineRoot" "${{ github.workspace }}\wsl-artifact\alpine-docker-wsl.tar"
          wsl -d $env:WSL_DISTRO -- cat /etc/os-release

      - name: Start Docker daemon
        shell: pwsh
        run: |
          wsl -d $env:WSL_DISTRO -- sh -c 'nohup dockerd > /var/log/dockerd.log 2>&1 & sleep 10 && docker info'

      - name: Install Docker CLI on Windows
        shell: pwsh
        run: |
          choco install docker-cli -y

      - name: Verify Docker from Windows
        shell: pwsh
        run: |
          docker info

      - name: Run hello-world container
        shell: pwsh
        run: |
          docker run hello-world:linux
