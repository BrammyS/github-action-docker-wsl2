name: wsl-2-action

on:
  workflow_dispatch:
  push:

jobs:
  build:
    runs-on: windows-2025
    timeout-minutes: 30
    env:
      DOCKER_HOST: tcp://127.0.0.1:2375
      WSL_DISTRO: Ubuntu-26.04
      
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Check WSL status
        shell: pwsh
        run: |
          wsl --version
          wsl --status
          wsl --list --online

      - name: Ensure WSL platform is enabled
        shell: pwsh
        run: |
          wsl --install --no-distribution
          wsl --set-default-version 2

      - name: Download Alpine
        shell: pwsh
        run: |
          Invoke-WebRequest `
            -Uri "https://dl-cdn.alpinelinux.org/alpine/v3.24/releases/x86_64/alpine-minirootfs-3.24.1-x86_64.tar.gz" `
            -OutFile "$PWD/alpine-minirootfs.tar.gz"

          New-Item -ItemType Directory -Force -Path "$PWD\AlpineRoot" | Out-Null
          wsl --import Alpine "$PWD\AlpineRoot" "$PWD\alpine-minirootfs.tar.gz"

      - name: Install Ubuntu distro explicitly
        shell: pwsh
        run: |
          wsl --install -d $env:WSL_DISTRO

      - name: Verify distro
        shell: pwsh
        run: |
          wsl -d $env:WSL_DISTRO -l -v
          wsl -d $env:WSL_DISTRO -- uname -a

      - name: wsl - prevent shutdown
        run:  wsl -d $env:WSL_DISTRO --exec dbus-launch true   

      - name: wsl - update wsl repositories
        run: | 
          wsl -d $env:WSL_DISTRO sudo apt-get update

      - name: wsl - register docker repositories
        run: |
          wsl -d $env:WSL_DISTRO sudo apt-get install ca-certificates curl
          wsl -d $env:WSL_DISTRO -- sudo install -m 0755 -d /etc/apt/keyrings
          wsl -d $env:WSL_DISTRO -- sudo curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
          wsl -d $env:WSL_DISTRO -- sudo chmod a+r /etc/apt/keyrings/docker.asc
          wsl -d $env:WSL_DISTRO -- bash -c 'echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo ${UBUNTU_CODENAME:-$VERSION_CODENAME}) stable" | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null'
          wsl -d $env:WSL_DISTRO sudo apt-get update
   
      - name: wsl - install docker
        run: |
          wsl -d $env:WSL_DISTRO sudo apt-get install docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin -y

      - name: wsl - check Docker Daemon
        run: wsl -d $env:WSL_DISTRO docker info

      - name: wsl - expose docker daemon to tcp
        run: |
          wsl -d $env:WSL_DISTRO bash -c "sudo sed -i 's|fd://|tcp://127.0.0.1:2375|' /usr/lib/systemd/system/docker.service"
          wsl -d $env:WSL_DISTRO sudo systemctl daemon-reload
          wsl -d $env:WSL_DISTRO sudo service docker restart

      - name: windows - install docker client
        run: |
          choco install docker-cli

      - name: windows - check Docker Daemon
        run: docker info
      
      - name: windows - run linux hello world container
        run: docker run hello-world:linux
